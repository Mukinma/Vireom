<header class="admin-topbar" aria-label="Barra superior">
  <div class="admin-topbar__left">
    <div class="admin-topbar__brand">
      <img
        class="admin-topbar__brand-logo"
        src="/static/images/logo-white.svg"
        alt="Osvium"
      />
    </div>

    <span class="admin-topbar__divider" aria-hidden="true"></span>

    <div class="admin-topbar__clock" aria-label="Hora actual">
      <strong id="adminClockTime">--:--</strong>
      <span id="adminClockDate">-- --- ----</span>
    </div>
  </div>

  <div class="admin-topbar__right">
    <button
      class="admin-topbar__action admin-topbar__action--danger"
      type="button"
      data-logout-action
      aria-label="Cerrar sesión"
      title="Cerrar sesión"
    >
      <span class="admin-topbar__action-icon" aria-hidden="true">
        <svg class="icon" aria-hidden="true"><use href="/static/icons/lucide/lucide-sprite.svg#logout-filled"></use></svg>
      </span>
      <span class="topbar-logout-label">Salir</span>
    </button>
  </div>
</header>
