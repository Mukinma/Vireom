<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Osvium · Terminal de acceso biométrico</title>
  <link rel="icon" type="image/svg+xml" href="/static/images/logo-white.svg?v={{ asset_version }}" />
  <link rel="stylesheet" href="/static/css/styles.css?v={{ asset_version }}" />
  <link rel="stylesheet" href="/static/css/kiosk.css?v={{ asset_version }}" />
  <script>
    (function(){
      try{
        var t=localStorage.getItem('camerapi_theme');
        document.documentElement.className=t||'theme-dark';
      }catch(e){
        document.documentElement.className='theme-dark';
      }
      try{
        var desktopPending=new URLSearchParams(window.location.search).get('desktop-launch')==='1';
        if(desktopPending){
          document.documentElement.classList.add('desktop-launch-pending');
          window.__VIREOM_DESKTOP_PENDING__=true;
        }
      }catch(e){}
    })();
  </script>
</head>
<body class="kiosk-body">

  <div class="lockscreen" id="lockScreen" role="dialog" aria-label="Pantalla de bloqueo">
    <div class="lockscreen__bg"></div>
    <div class="lockscreen__content">
      <div class="lockscreen__clock-box">
        <span class="lockscreen__day" id="lockDay">--</span>
        <span class="lockscreen__number" id="lockNumber">--</span>
        <span class="lockscreen__month" id="lockMonth">---</span>
        <span class="lockscreen__time" id="lockTime">--:--</span>
      </div>
      <p class="lockscreen__hint">Toca para continuar</p>
    </div>
  </div>

  <div class="kiosk-shell" id="kioskShell">

    <header class="kiosk-header">
      <button
        id="headerLogoButton"
        class="kiosk-header__brand logo-clickable"
        type="button"
        data-logo-gate="admin-access"
        aria-label="Ir a configuración o login"
      >
        <img
          class="kiosk-header__logo"
          src="/static/images/logo-white.svg"
          alt="Osvium"
          data-theme-logo
          data-logo-light="/static/images/logo-white.svg"
          data-logo-dark="/static/images/logo-white.svg"
        />
        <div class="kiosk-header__text">
          <strong>Osvium</strong>
        </div>
      </button>
    </header>

    <div class="status-hidden" aria-hidden="true">
      <span>CAM <strong id="camState">-</strong></span>
      <span>MOD <strong id="modelState">-</strong></span>
      <span>GPIO <strong id="gpioState">-</strong></span>
      <span>FPS <strong id="fpsState">0</strong></span>
      <span id="systemStateBadge" class="state-chip state-warning">Sin modelo</span>
    </div>

    <main class="kiosk-content">
      <div class="kiosk-viewport">

        <div class="kiosk-camera" id="cameraShell">
          <div class="kiosk-camera__stage" id="cameraStage">
            <img id="videoFeed" class="kiosk-camera__feed" src="" data-stream-src="/api/stream" alt="Cámara en vivo" />

            <div id="faceGuide" class="face-guide is-idle" aria-hidden="true">
              <!-- Silhouette contour -->
              <svg class="face-guide__silhouette" viewBox="0 0 400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
                <ellipse cx="200" cy="230" rx="130" ry="172"
                  stroke="currentColor" stroke-width="3.8" fill="none"
                  stroke-dasharray="8 4" opacity="0.7"/>
                <!-- Chin accent -->
                <path d="M120 360 Q200 440 280 360" stroke="currentColor" stroke-width="3" fill="none" opacity="0.65"/>
                <!-- Center crosshair (subtle) -->
                <line x1="200" y1="192" x2="200" y2="268" stroke="currentColor" stroke-width="1.3" opacity="0.34"/>
                <line x1="162" y1="230" x2="238" y2="230" stroke="currentColor" stroke-width="1.3" opacity="0.34"/>
              </svg>
              <!-- Guidance message -->
              <div class="face-guide__msg" id="guidanceMessage">Coloca tu rostro dentro de la guía</div>
            </div>

            <div id="faceIndicator" class="face-indicator idle" aria-hidden="true" hidden></div>
          </div>
        </div>

        <aside class="kiosk-info" id="infoPanel">
          <div class="kiosk-info__header">
            <h1 class="kiosk-info__title" id="infoTitle">Validando identidad</h1>
            <p class="kiosk-info__desc" id="infoDesc">
              Espera un momento mientras verificamos tu acceso
            </p>
          </div>
          
          <div class="kiosk-info__footer">
            <div class="kiosk-info__progress">
              <div class="kiosk-info__progress-bar is-idle" id="authProgressBar"></div>
            </div>
            <div class="kiosk-info__hint">
              Colócate a una distancia adecuada<br>y evita mover la cabeza
            </div>
          </div>
        </aside>

      </div>
    </main>
  </div>

  <script src="/static/js/theme.js?v={{ asset_version }}"></script>
  <script src="/static/js/lockscreen.js?v={{ asset_version }}"></script>
  <script src="/static/js/face-action.js?v={{ asset_version }}"></script>
  <script src="/static/js/logo-navigation.js?v={{ asset_version }}"></script>
  <script type="module" src="/static/js/lockscreen-fsm.js?v={{ asset_version }}"></script>
  <script type="module" src="/static/js/lockscreen-controller.js?v={{ asset_version }}"></script>
  <script type="module" src="/static/js/app.js?v={{ asset_version }}"></script>
</body>
</html>
